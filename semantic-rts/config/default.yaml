llm:
  provider: gemini
  chat_model: gemini-3.1-flash-lite-preview
  embedding_model: gemini-embedding-001
  max_retries: 5
  rate_limit_rpm: 2900      # paid tier: embedding limit 3K RPM, chat limit 4K RPM
  rate_limit_rpd: 145000    # paid tier: chat model 150K RPD limit

vector_store:
  type: faiss
  index_kind: IndexFlatIP   # cosine sim via normalized vectors
  embedding_dim: 3072       # gemini-embedding-001 native dimension

kb:
  summary_max_tokens: 200
  source_max_tokens: 1500
  tier_keywords:
    tier_1: [security, auth, password, crypto, privacy, payment, authentication, authorization]
    tier_2: [persistence, database, transaction, concurrency, jdbc, hibernate, sql]
    tier_3: [api, controller, service, endpoint, handler]
    tier_4: [util, helper, format, parse, convert]
    tier_5: [getter, setter, tostring, equals, hashcode, constructor]

impact:
  skip_intent_agent: false
  diff_max_tokens: 8000
  micro_diff_bypass_enabled: true
  micro_diff_max_lines: 5

retrieval:
  top_k: 20
  similarity_threshold: 0.60
  token_overlap_weight: 0.12
  package_proximity_weight: 0.08
  bm25_weight: 0.20
  negative_pass_enabled: true
  negative_pass_penalty: 0.25
  adaptive_threshold_enabled: true
  adaptive_threshold_min: 0.30

selector:
  safety_bridge:
    always_include_tier_1: true
    tier_2_threshold: 0.40
  precision_filter:
    tier_5_min: 0.70
    tier_4_min: 0.62
  max_selected: 40
  topology_multiplier: 1.20
  topology_trigger_change_types: [api_change, refactoring]
  topology_trigger_packages: [util, common, base, core, shared, helper]
  sensitivity_multiplier_enabled: true
  cross_encoder_enabled: false
  cross_encoder_top_n: 40

paths:
  defects4j_home: ${DEFECTS4J_HOME}
  kb_dir: data/kb
  eval_dir: data/eval
  cache_dir: data/cache
  logs_dir: data/logs
  work_dir: work/checkouts
